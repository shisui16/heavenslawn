<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physica — Physics & Math Learning Engine</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="window.__katexLoaded = true"></script>

  <!-- Nerdamer for symbolic math -->
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-symbol">∮</span>
        <span class="logo-text">Physica</span>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
    </div>

    <div class="chapter-selector">
      <label class="selector-label">CHAPTER</label>
      <select id="chapterSelect" class="chapter-select"></select>
    </div>

    <div class="progress-panel">
      <label class="selector-label">PROGRESS</label>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="streak-panel">
      <label class="selector-label">STREAK</label>
      <div class="streak-display">
        <span class="streak-flame">🔥</span>
        <span class="streak-count" id="streakCount">0</span>
        <span class="streak-label">correct in a row</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <button class="nav-item active" id="navStudy">Study Mode</button>
      <button class="nav-item" id="navReview">Review Errors</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-info">
        <span class="chapter-badge" id="chapterBadge">Chapter 1</span>
        <span class="item-counter" id="itemCounter">Item 1 of 1</span>
      </div>
      <div class="topbar-score">
        <span class="score-label">Score</span>
        <span class="score-value" id="scoreValue">0</span>
      </div>
    </header>

    <!-- Content stage -->
    <div class="stage" id="stage">

      <!-- Text card -->
      <div class="card text-card hidden" id="textCard">
        <div class="card-type-tag">Theory</div>
        <div class="card-body" id="textBody"></div>
        <div class="card-actions">
          <button class="btn btn-ghost" id="textPrev">← Prev</button>
          <button class="btn btn-primary" id="textNext">Next →</button>
        </div>
      </div>

      <!-- Question card -->
      <div class="card question-card hidden" id="questionCard">
        <div class="card-type-tag" id="questionTypeTag">MCQ</div>
        <div class="question-body" id="questionBody"></div>

        <!-- MCQ options -->
        <div class="options-grid" id="mcqOptions"></div>

        <!-- MSQ options -->
        <div class="options-grid" id="msqOptions"></div>

        <!-- Numeric input -->
        <div class="numeric-input-wrap hidden" id="numericWrap">
          <input type="number" class="num-input" id="numericValue" placeholder="Value" step="any" />
          <input type="text" class="unit-input" id="numericUnit" placeholder="Unit (e.g. m/s)" />
        </div>

        <!-- Symbolic input -->
        <div class="symbolic-input-wrap hidden" id="symbolicWrap">
          <div class="symbolic-hint">Enter an antiderivative (without +C)</div>
          <input type="text" class="sym-input" id="symbolicInput" placeholder="e.g. x^3/3 + 2*x" />
          <div class="sym-preview" id="symPreview"></div>
        </div>

        <!-- Feedback -->
        <div class="feedback hidden" id="feedback">
          <div class="feedback-icon" id="feedbackIcon"></div>
          <div class="feedback-text" id="feedbackText"></div>
        </div>

        <div class="card-actions">
          <button class="btn btn-ghost" id="questionPrev">← Prev</button>
          <button class="btn btn-secondary" id="submitBtn">Submit</button>
          <button class="btn btn-primary hidden" id="nextBtn">Next →</button>
        </div>
      </div>

    </div>

    <!-- Completion screen -->
    <div class="completion hidden" id="completion">
      <div class="completion-inner">
        <div class="completion-icon">🎓</div>
        <h2 class="completion-title">Chapter Complete!</h2>
        <div class="completion-stats" id="completionStats"></div>
        <button class="btn btn-primary" id="restartBtn">Restart Chapter</button>
      </div>
    </div>

  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
